* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.root { padding: 16px 0; }
.tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.tab {
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
  font-size: 12px; font-weight: 500; border: 1px solid var(--color-border-secondary);
  color: var(--color-text-secondary); background: var(--color-background-secondary);
  transition: all .15s;
}
.tab.active {

}
.tab:hover:not(.active) { border-color: var(--color-border-primary); color: var(--color-text-primary); }
.panel { display: none; }
.panel.active { display: block; }
.section-title {

  color: var(--color-text-tertiary); text-transform: uppercase;
  margin: 18px 0 8px;
}
.card {

  border-radius: var(--border-radius-lg);
  margin-bottom: 8px;
  overflow: hidden;
}
.card-header {
  display: flex; align-items: baseline; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  background: var(--color-background-secondary);
  transition: background .12s;
}
.card-header:hover { background: var(--color-background-tertiary); }
.fn-name {
  font-family: var(--font-mono); font-size: 13px;
  color: #185FA5; font-weight: 500; flex-shrink: 0;
}
.fn-sig {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--color-text-tertiary); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; max-width: 280px;
}
.fn-brief {
  font-size: 12px; color: var(--color-text-secondary);
  margin-left: auto; flex-shrink: 0;
}
.card-body { display: none; padding: 12px 14px; border-top: 1px solid var(--color-border-tertiary); }
.card-body.open { display: block; }
.desc { font-size: 13px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 10px; }
.code-block {
  background: var(--color-background-tertiary);
  border-radius: 6px; padding: 10px 12px;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--color-text-primary); line-height: 1.7;
  overflow-x: auto; white-space: pre;
}
.tag {
  display: inline-block; font-size: 10px; font-weight: 500;
  padding: 1px 7px; border-radius: 10px; margin-right: 4px;
}
.tag-stage { background: #E1F5EE; color: #0F6E56; }
.tag-layer { background: #E6F1FB; color: #185FA5; }
.tag-prim  { background: #EEEDFE; color: #534AB7; }

.tag-ref   { background: #EAF3DE; color: #3B6D11; }
.tag-var   { background: #FBEAF0; color: #993556; }
.arrow { font-size: 11px; color: var(--color-text-tertiary); margin-left: auto; transition: transform .15s; }
.arrow.open { transform: rotate(90deg); }

function buildUI() {
  const tabsEl = document.getElementById('tabs')
  const panelsEl = document.getElementById('panels')

  data.forEach((cat, ci) => {
    const tab = document.createElement('button')
    tab.className = 'tab' + (ci===0?' active':'')
    tab.textContent = cat.tab
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
      tab.classList.add('active')
      document.getElementById('panel-'+ci).classList.add('active')
    }
    tabsEl.appendChild(tab)

    const panel = document.createElement('div')
    panel.className = 'panel' + (ci===0?' active':'')
    panel.id = 'panel-'+ci

    cat.sections.forEach(sec => {
      const st = document.createElement('div')
      st.className = 'section-title'
      st.textContent = sec.title
      panel.appendChild(st)

      sec.items.forEach(item => {
        const card = document.createElement('div')
        card.className = 'card'

        const hdr = document.createElement('div')
        hdr.className = 'card-header'
        hdr.innerHTML = `
          <span class="fn-name">${item.name.split('(')[0].split('.').pop()}()</span>
          <span class="fn-sig">${item.sig}</span>
          <span class="fn-brief">${item.brief}</span>
          <span class="arrow">▶</span>
        `
        const body = document.createElement('div')
        body.className = 'card-body'
        body.innerHTML = `
          <p class="desc">${item.desc}</p>
          <div class="code-block">${item.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        `
        hdr.onclick = () => {
          const open = body.classList.toggle('open')
          hdr.querySelector('.arrow').classList.toggle('open', open)
        }
        card.appendChild(hdr)
        card.appendChild(body)
        panel.appendChild(card)
      })
    })

    panelsEl.appendChild(panel)
  })
}
buildUI()
</script>

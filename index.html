<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USD Dev Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0c0f0a;--surface:#131710;--border:#1e2419;--border-h:#2e3828;
    --accent:#7fff5a;--accent-dim:#4a9933;
    --tp:#e8f0e4;--ts:#6b7d64;--tt:#3a4535;
    --err:#e07050;--err-bg:#1f0f0a;
    --mono:'DM Mono',monospace;--display:'Syne',sans-serif;--body:'Noto Sans KR',sans-serif;
  }
  html,body{height:100%;background:var(--bg);color:var(--tp);font-family:var(--body)}
  body{display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:48px 48px;opacity:.5;pointer-events:none}
  body::after{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);
    width:500px;height:500px;
    background:radial-gradient(ellipse,rgba(127,255,90,.05) 0%,transparent 70%);pointer-events:none}
  .card{position:relative;z-index:1;width:100%;max-width:400px;padding:48px 40px 40px;
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    display:flex;flex-direction:column;gap:32px;
    opacity:0;transform:translateY(20px);animation:up .5s ease .1s forwards}
  .card::before{content:'';position:absolute;top:0;left:40px;right:40px;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent-dim),transparent);border-radius:1px}
  .brand{display:flex;flex-direction:column;gap:10px}
  .logo{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;
    color:var(--accent-dim);letter-spacing:.18em;text-transform:uppercase}
  .logo-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 8px rgba(127,255,90,.6);animation:pulse 2s ease-in-out infinite}
  h1{font-family:var(--display);font-size:32px;font-weight:800;line-height:1;letter-spacing:-.02em;color:var(--tp)}
  h1 span{color:var(--accent)}
  .subtitle{font-size:13px;color:var(--ts);line-height:1.6}
  .form{display:flex;flex-direction:column;gap:12px}
  .field-label{font-family:var(--mono);font-size:10px;color:var(--tt);
    letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
  .input-wrap{position:relative}
  input[type="password"],input[type="text"]{width:100%;padding:12px 44px 12px 14px;
    background:var(--bg);border:1px solid var(--border);border-radius:8px;
    font-family:var(--mono);font-size:14px;color:var(--tp);outline:none;
    transition:border-color .15s,box-shadow .15s;letter-spacing:.12em}
  input::placeholder{color:var(--tt);letter-spacing:0}
  input:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px rgba(127,255,90,.08)}
  input.error{border-color:var(--err);box-shadow:0 0 0 3px rgba(224,112,80,.08);animation:shake .3s ease}
  .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:var(--tt);padding:2px;transition:color .15s}
  .eye-btn:hover{color:var(--ts)}
  .eye-btn svg{width:16px;height:16px;display:block}
  button[type="submit"]{width:100%;padding:13px;background:transparent;
    border:1px solid var(--accent-dim);border-radius:8px;
    font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.08em;
    color:var(--accent);cursor:pointer;transition:background .15s,box-shadow .15s}
  button[type="submit"]:hover{background:rgba(127,255,90,.06);box-shadow:0 0 20px rgba(127,255,90,.1)}
  button[type="submit"]:active{transform:scale(.98)}
  .error-msg{font-family:var(--mono);font-size:11px;color:var(--err);
    display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .2s;min-height:16px}
  .error-msg.show{opacity:1}
  .error-msg::before{content:'✕';font-size:10px}
  .attempts{font-family:var(--mono);font-size:10px;color:var(--tt);text-align:center}
  .attempts span{color:var(--err)}
  .card-footer{border-top:1px solid var(--border);padding-top:20px;
    font-family:var(--mono);font-size:10px;color:var(--tt);display:flex;align-items:center;gap:6px}
  .card-footer::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--tt);flex-shrink:0}
  .locked-msg{font-family:var(--mono);font-size:12px;color:var(--err);text-align:center;line-height:1.7;display:none}
  .success-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .4s;flex-direction:column;gap:16px}
  .success-overlay.show{opacity:1;pointer-events:all}
  .success-icon{font-family:var(--mono);font-size:28px;color:var(--accent);animation:blink 1s step-end infinite}
  .success-text{font-family:var(--mono);font-size:12px;color:var(--ts);letter-spacing:.1em}
  @keyframes up{to{opacity:1;transform:translateY(0)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">█</div>
  <div class="success-text">접근 허용됨 — 이동 중...</div>
</div>
<div class="card">
  <div class="brand">
    <div class="logo"><span class="logo-dot"></span>USD Dev Tools</div>
    <h1>접근<br><span>인증</span></h1>
    <p class="subtitle">비밀번호를 입력하면 메인 페이지로 이동합니다.</p>
  </div>
  <div class="form" id="formWrap">
    <div>
      <div class="field-label">Password</div>
      <div class="input-wrap">
        <input type="password" id="pwInput" placeholder="비밀번호 입력" autocomplete="current-password" autofocus/>
        <button class="eye-btn" type="button" id="eyeBtn" tabindex="-1" aria-label="비밀번호 보기">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="error-msg" id="errMsg">비밀번호가 올바르지 않습니다</div>
    </div>
    <button type="submit" id="submitBtn" onclick="checkPw()">입장하기 →</button>
    <div class="attempts" id="attemptsEl" style="display:none">남은 시도: <span id="attemptsLeft">5</span>회</div>
    <div class="locked-msg" id="lockedMsg">너무 많은 시도가 감지되었습니다.<br>잠시 후 다시 시도해 주세요.</div>
  </div>
  <div class="card-footer">USD Pipeline Reference · 2026</div>
</div>
<script>
  // ================================================
  //  ★ 비밀번호 변경: PASSWORD 값을 수정하세요 ★
  // ================================================
  const PASSWORD     = 'usd2026'
  const MAX_ATTEMPTS = 5
  const LOCK_MINUTES = 5
  const TARGET_PAGE  = 'main.html'
  // ================================================

  const input        = document.getElementById('pwInput')
  const errMsg       = document.getElementById('errMsg')
  const submitBtn    = document.getElementById('submitBtn')
  const attemptsEl   = document.getElementById('attemptsEl')
  const attemptsLeft = document.getElementById('attemptsLeft')
  const lockedMsg    = document.getElementById('lockedMsg')
  const overlay      = document.getElementById('successOverlay')
  const eyeBtn       = document.getElementById('eyeBtn')
  const eyeIcon      = document.getElementById('eyeIcon')

  let attempts = 0
  let locked   = false

  const lockUntil = sessionStorage.getItem('lockUntil')
  if (lockUntil && Date.now() < +lockUntil) setLocked()

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPw()
    if (errMsg.classList.contains('show')) {
      errMsg.classList.remove('show')
      input.classList.remove('error')
    }
  })

  eyeBtn.addEventListener('click', () => {
    const isHidden = input.type === 'password'
    input.type = isHidden ? 'text' : 'password'
    eyeIcon.innerHTML = isHidden
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
    input.focus()
  })

  function checkPw() {
    if (locked) return
    if (input.value.trim() === PASSWORD) {
      overlay.classList.add('show')
      setTimeout(() => { window.location.href = TARGET_PAGE }, 1000)
    } else {
      attempts++
      input.classList.add('error')
      errMsg.classList.add('show')
      input.value = ''
      input.focus()
      const remaining = MAX_ATTEMPTS - attempts
      if (remaining <= 2 && remaining > 0) {
        attemptsEl.style.display = 'block'
        attemptsLeft.textContent = remaining
      }
      if (attempts >= MAX_ATTEMPTS) {
        sessionStorage.setItem('lockUntil', Date.now() + LOCK_MINUTES * 60 * 1000)
        setLocked()
      }
    }
  }

  function setLocked() {
    locked = true
    submitBtn.disabled = true
    submitBtn.style.opacity = '.4'
    submitBtn.style.cursor = 'not-allowed'
    input.disabled = true
    input.style.opacity = '.4'
    attemptsEl.style.display = 'none'
    lockedMsg.style.display = 'block'
    errMsg.classList.remove('show')
    const interval = setInterval(() => {
      const until  = +sessionStorage.getItem('lockUntil')
      const remain = Math.ceil((until - Date.now()) / 1000)
      if (remain <= 0) { clearInterval(interval); sessionStorage.removeItem('lockUntil'); location.reload() }
      else {
        const m = Math.floor(remain / 60), s = remain % 60
        lockedMsg.innerHTML = `너무 많은 시도가 감지되었습니다.<br>${m}:${String(s).padStart(2,'0')} 후 다시 시도해 주세요.`
      }
    }, 1000)
  }
</script>
</body>
</html>
